repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args: [--fix, --preview]
      - id: ruff-format
        args: [--preview]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

      - id: pylint
        name: pylint (pylint-plugin)
        entry: >-
          uv run pylint --load-plugins=main --disable=all
          --enable=app-no-docstrings,app-test-aaa-markers,app-test-no-blank-lines,app-unused-arg-use-del,app-module-const-naming,app-no-file-level-disable,app-no-inline-imports,app-no-relative-imports,app-use-contextlib-suppress,app-frozenset-constant,app-require-final
          src tests
        language: system
        types: [python]
        pass_filenames: false
