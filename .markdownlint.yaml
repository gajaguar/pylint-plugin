# Allow ordered list inconsistencies (sometimes intentional)
MD029: false

# Allow fenced code blocks without language (sometimes appropriate)
MD040: false

# Allow duplicate headings in sibling sections
MD024:
  siblings_only: true

# Require aligned table columns with aligned delimiter rows
MD060:
  style: aligned
  aligned_delimiter: true

# Allow longer lines for tables and code blocks
MD013:
  line_length: 80
  heading_line_length: 80
  code_block_line_length: 80
  tables: false
